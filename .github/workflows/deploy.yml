name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Only one deployment at a time; cancel in-progress if a newer push arrives.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Build ecs-lisp (TypeScript -> static bundle)
        working-directory: ecs-lisp
        run: bun build ./index.html --outdir dist --minify

      - name: Assemble site
        run: |
          mkdir -p _site
          # All root static pages, minus build/source dirs.
          rsync -a --exclude='.git' --exclude='_site' \
                --exclude='node_modules' --exclude='ecs-lisp' ./ _site/
          # Serve the BUILT ecs-lisp page (not its TypeScript source) at /ecs-lisp/.
          mkdir -p _site/ecs-lisp
          cp -r ecs-lisp/dist/. _site/ecs-lisp/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '_site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
