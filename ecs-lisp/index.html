<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ECS · LISP</title>
    <style>
      :root {
        --bg: #0e1116;
        --panel: #161b22;
        --border: #2b333d;
        --fg: #d6deeb;
        --dim: #7a8694;
        --accent: #8be9fd;
        --ok: #7ee787;
        --err: #ff7b72;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 14px/1.5 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        height: 100vh;
        display: grid;
        grid-template-rows: auto 1fr;
      }
      header {
        padding: 12px 18px;
        border-bottom: 1px solid var(--border);
      }
      header h1 { margin: 0; font-size: 14px; font-weight: 600; }
      header p { margin: 2px 0 0; color: var(--dim); font-size: 12px; }
      main {
        display: grid;
        grid-template-columns: 1fr 1fr;
        min-height: 0;
      }
      .col { display: flex; flex-direction: column; min-height: 0; min-width: 0; }
      .col + .col { border-left: 1px solid var(--border); }
      .label {
        padding: 8px 14px;
        color: var(--dim);
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        border-bottom: 1px solid var(--border);
        display: flex;
        justify-content: space-between;
        align-items: center;
      }
      #history {
        flex: 1;
        overflow: auto;
        padding: 14px;
        min-height: 0;
      }
      #history .entry { margin-bottom: 8px; }
      #history .cmd { color: var(--accent); cursor: pointer; }
      #history .cmd:hover { text-decoration: underline; }
      #history .res { color: var(--ok); }
      #history .err { color: var(--err); }
      #history .empty { color: var(--dim); }
      .prompt { color: var(--accent); font-weight: 600; }
      #input {
        flex: 1;
        border: 0;
        outline: 0;
        background: transparent;
        color: var(--fg);
        font: inherit;
      }
      .bar {
        padding: 10px 14px;
        border-top: 1px solid var(--border);
        display: flex;
        gap: 8px;
        align-items: center;
      }
      button {
        font: inherit;
        background: var(--accent);
        color: #08111a;
        border: 0;
        border-radius: 5px;
        padding: 6px 14px;
        cursor: pointer;
        font-weight: 600;
      }
      button.ghost { background: transparent; color: var(--dim); border: 1px solid var(--border); }
      button.mini { padding: 3px 9px; font-size: 12px; }
      select {
        font: inherit;
        font-size: 12px;
        background: var(--bg);
        color: var(--fg);
        border: 1px solid var(--border);
        border-radius: 5px;
        padding: 3px 6px;
      }
      .tools { display: flex; gap: 6px; align-items: center; }
      .tabs { display: flex; gap: 14px; }
      .tab {
        background: none;
        border: 0;
        color: var(--dim);
        font: inherit;
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        cursor: pointer;
        padding: 0;
      }
      .tab.active { color: var(--fg); }
      #history .sys { color: var(--dim); font-style: italic; }
      #help { flex: 1; overflow: auto; padding: 14px; min-height: 0; }
      #help h2 {
        font-size: 11px; letter-spacing: 0.08em; text-transform: uppercase;
        color: var(--dim); margin: 0 0 10px;
      }
      #help dl { display: grid; grid-template-columns: max-content 1fr; gap: 4px 16px; margin: 0 0 20px; }
      #help dt { color: var(--accent); white-space: nowrap; }
      #help dd { color: var(--fg); margin: 0; }
      #help .arg { color: var(--ok); }
      #help p { color: var(--dim); margin: 0 0 8px; }
      #help code { color: var(--accent); }
      #world {
        flex: 1;
        overflow: auto;
        padding: 14px;
        white-space: pre-wrap;
        margin: 0;
        min-height: 0;
      }
      .pin { color: var(--dim); }
    </style>
  </head>
  <body>
    <header>
      <h1>Entity Component System × LISP</h1>
      <p>Type s-expressions one at a time, mutate a world. Try <span class="pin">(move Wolf Forest)</span>.</p>
    </header>
    <main>
      <section class="col">
        <div class="label">
          <span>History</span>
          <span class="tools">
            <select id="examples" title="load an example program">
              <option value="">examples…</option>
            </select>
            <button id="save" class="ghost mini" title="save this session to the browser">Save</button>
            <button id="load" class="ghost mini" title="restore the saved session">Load</button>
          </span>
        </div>
        <div id="history"></div>
        <div class="bar">
          <span class="prompt">›</span>
          <input id="input" type="text" spellcheck="false" autocomplete="off"
                 placeholder="(entity Bear)" />
          <button id="run">Run</button>
          <button id="tick" class="ghost" title="advance the simulation one tick">⏱ Tick</button>
          <button id="play" class="ghost" title="auto-advance the simulation">▶ Play</button>
          <button id="reset" class="ghost">Reset</button>
        </div>
      </section>
      <section class="col">
        <div class="label">
          <span class="tabs">
            <button class="tab active" data-tab="world">World</button>
            <button class="tab" data-tab="help">Help</button>
          </span>
          <span class="pin" id="count"></span>
        </div>
        <pre id="world"></pre>
        <div id="help" hidden></div>
      </section>
    </main>
    <script type="module" src="./src/main.ts"></script>
  </body>
</html>
