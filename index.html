<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>7M9</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #fff;
      color: #111;
      min-height: 100vh;
      padding: 80px 40px;
      max-width: 640px;
      margin: 0 auto;
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.01em;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 64px;
    }

    ul {
      list-style: none;
    }

    li {
      border-top: 1px solid #eee;
      padding: 20px 0;
    }

    li:last-child {
      border-bottom: 1px solid #eee;
    }

    a.project {
      text-decoration: none;
      color: inherit;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      gap: 16px;
    }

    a.project:hover .project-name {
      text-decoration: underline;
    }

    .project-name {
      font-size: 0.95rem;
      font-weight: 500;
    }

    .project-desc {
      font-size: 0.85rem;
      color: #888;
      text-align: right;
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <h1>7M9</h1>
  <p class="subtitle">A collection of projects.</p>

  <ul>
    <li>
      <a class="project" href="terminal.html">
        <span class="project-name">Terminal</span>
        <span class="project-desc">CRT boot screen</span>
      </a>
    </li>
    <li>
      <a class="project" href="chronicledb.html">
        <span class="project-name">ChronicleDB</span>
        <span class="project-desc">Raft-consensus distributed event log</span>
      </a>
    </li>
    <li>
      <a class="project" href="chronicledb-vanilla.html">
        <span class="project-name">ChronicleDB (Vanilla)</span>
        <span class="project-desc">Vanilla JS build</span>
      </a>
    </li>
    <li>
      <a class="project" href="whiteboard.html">
        <span class="project-name">Whiteboard</span>
        <span class="project-desc">scan_and_upload feature planning</span>
      </a>
    </li>
  </ul>
</body>
</html>
